name: Build
on:
  push:
  pull_request:


jobs:
  lint:
    name: Run lint
    runs-on: ubuntu-18.04
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v2
      - name: Install dependencies
        run: python -mpip install "ome-ansible-molecule<0.5"
      - name: Run Ansible lint
        run: ansible-lint -v *.yml --exclude ../kubespray/ --exclude ./roles/kubernetes/ --exclude idr-firewall.yml --exclude idr-kubernetes-apply.yml --exclude idr-reset-users-groups.yml
        working-directory: ansible    
  build:
    needs: lint
    name: Build
    strategy:
      matrix:
        scenario:
          - 'publicidr'
          - 'ftp'
    runs-on: ubuntu-18.04
    steps:
      - name: Run molecule tests
        run: molecule test -s ${{ matrix.scenario }}
        working-directory: ansible
